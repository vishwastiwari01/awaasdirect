services:
  - type: web
    name: awaasdirect-api
    env: node
    plan: free
    region: singapore
    buildCommand: "cd api && npm install && npx prisma generate && npm run build"
    startCommand: "cd api && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Required for Prisma
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      # Auth secrets
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # Frontend URL for CORS
      - key: FRONTEND_URL
        sync: false
      # AWS S3 for uploads
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
