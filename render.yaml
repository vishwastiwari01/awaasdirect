services:
  - type: web
    name: awaasdirect-api
    env: node
    plan: free
    region: singapore
    rootDir: api
    buildCommand: "npm install --include=dev && npx prisma generate && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Required for Prisma
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      # Auth secrets
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # Frontend URL for CORS
      - key: FRONTEND_URL
        sync: false
      # Supabase Storage for uploads
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET_NAME
        value: awaasdirect-assets
